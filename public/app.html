<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sigma Chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>
<link rel="stylesheet" href="/css/app.css">
</head>
<body>
<!-- Sidebar -->
<div id="sidebar">
  <div id="serverList">
    <div class="server-icon active" id="homeBtn" title="Home" onclick="showHome()">⚡</div>
    <div class="separator"></div>
    <div id="serverIcons"></div>
    <div class="separator"></div>
    <div class="server-icon add-server" title="Add Server" onclick="showModal('createServerModal')">+</div>
  </div>
  <div id="channelPanel">
    <div id="serverHeader"><span id="serverName">Home</span></div>
    <div id="channelList"></div>
    <div id="userPanel">
      <div id="selfAvatar" class="user-avatar" onclick="showModal('profileModal')"></div>
      <div id="selfInfo">
        <div id="selfUsername"></div>
        <div id="selfTag" style="font-size:12px;color:#96989d"></div>
      </div>
      <div style="margin-left:auto;display:flex;gap:8px">
        <button class="icon-btn" title="Settings" onclick="showSettings()">⚙</button>
        <button class="icon-btn" title="Store" onclick="openStore()">🛒</button>
        <button id="adminBtn" class="icon-btn" title="Admin" onclick="openAdmin()" style="display:none;color:#ed4245">🛡</button>
      </div>
    </div>
  </div>
</div>

<!-- Main content -->
<div id="main">
  <!-- Home view -->
  <div id="homeView">
    <div id="homePanel">
      <div class="home-tabs">
        <button class="home-tab active" onclick="showHomeTab('friends',this)">👥 Friends</button>
        <button class="home-tab" onclick="showHomeTab('requests',this)">📬 Requests</button>
        <button class="home-tab" onclick="showHomeTab('dms',this)">💬 DMs</button>
      </div>
      <div id="homeContent"></div>
    </div>
  </div>

  <!-- Channel view -->
  <div id="channelView" style="display:none">
    <div id="chatHeader">
      <span id="chatHeaderIcon">#</span>
      <span id="chatHeaderName">channel</span>
      <span id="chatHeaderTopic" style="color:#96989d;font-size:13px;margin-left:12px"></span>
    </div>
    <div id="messages"></div>
    <div id="typingBar"></div>
    <div id="inputArea">
      <textarea id="msgInput" placeholder="Send a message…" rows="1" maxlength="2000"></textarea>
      <button id="sendBtn" onclick="sendMessage()">Send</button>
    </div>
  </div>

  <!-- DM view -->
  <div id="dmView" style="display:none">
    <div id="dmHeader"><span id="dmHeaderName"></span></div>
    <div id="dmMessages"></div>
    <div id="dmTypingBar"></div>
    <div id="dmInputArea">
      <textarea id="dmInput" placeholder="Send a message…" rows="1" maxlength="2000"></textarea>
      <button onclick="sendDM()">Send</button>
    </div>
  </div>
</div>

<!-- ── MODALS ── -->
<!-- Create Server -->
<div id="createServerModal" class="modal-bg" onclick="if(event.target===this)closeModal('createServerModal')">
  <div class="modal"><h2>Create a Server</h2>
    <div class="field"><label>Server Name</label><input type="text" id="newServerName" placeholder="My Awesome Server" maxlength="100"></div>
    <div class="field"><label>Description (optional)</label><input type="text" id="newServerDesc" placeholder="What's this server about?" maxlength="300"></div>
    <div class="btn-row"><button class="btn-secondary" onclick="closeModal('createServerModal')">Cancel</button><button class="btn-primary" onclick="createServer()">Create</button></div>
  </div>
</div>

<!-- Join Server -->
<div id="joinServerModal" class="modal-bg" onclick="if(event.target===this)closeModal('joinServerModal')">
  <div class="modal"><h2>Join a Server</h2>
    <div class="field"><label>Invite Code</label><input type="text" id="joinCode" placeholder="e.g. AbCd1234"></div>
    <div class="btn-row"><button class="btn-secondary" onclick="closeModal('joinServerModal')">Cancel</button><button class="btn-primary" onclick="joinServer()">Join</button></div>
  </div>
</div>

<!-- Profile modal -->
<div id="profileModal" class="modal-bg" onclick="if(event.target===this)closeModal('profileModal')">
  <div class="modal" style="max-width:420px">
    <div id="profileBanner" style="height:100px;background:linear-gradient(135deg,#5865f2,#eb459e);border-radius:8px 8px 0 0;margin:-24px -24px 16px;position:relative">
      <div id="profileAvatar" style="width:80px;height:80px;border-radius:50%;border:4px solid #1e1f22;background:#36393f;position:absolute;bottom:-40px;left:16px;display:flex;align-items:center;justify-content:center;font-size:32px;overflow:hidden"></div>
    </div>
    <div style="margin-top:48px">
      <div id="profileUsername" style="font-size:20px;font-weight:700"></div>
      <div id="profileBadges" style="margin:6px 0;font-size:18px"></div>
      <div id="profileBio" style="color:#96989d;font-size:14px;margin-bottom:12px"></div>
      <div id="profileStats" style="display:flex;gap:16px;font-size:13px;color:#96989d;margin-bottom:16px"></div>
      <div id="profileActions"></div>
    </div>
    <button class="modal-close" onclick="closeModal('profileModal')">×</button>
  </div>
</div>

<!-- Settings modal -->
<div id="settingsModal" class="modal-bg" onclick="if(event.target===this)closeModal('settingsModal')">
  <div class="modal settings-modal">
    <div class="settings-nav">
      <button class="settings-tab active" onclick="showSettingsTab('account',this)">Account</button>
      <button class="settings-tab" onclick="showSettingsTab('profile',this)">Profile</button>
      <button class="settings-tab" onclick="showSettingsTab('privacy',this)">Privacy</button>
      <button class="settings-tab" onclick="openStore();closeModal('settingsModal')">Store →</button>
      <div style="flex:1"></div>
      <button class="settings-tab danger" onclick="logout()">Log Out</button>
    </div>
    <div class="settings-body" id="settingsBody"></div>
    <button class="modal-close" onclick="closeModal('settingsModal')">×</button>
  </div>
</div>

<!-- Store modal -->
<div id="storeModal" class="modal-bg" onclick="if(event.target===this)closeModal('storeModal')">
  <div class="modal store-modal">
    <h2>🛒 Sigma Store</h2>
    <div id="storePoints" style="color:#faa61a;font-weight:600;margin-bottom:16px;font-size:15px"></div>
    <div class="store-tabs">
      <button class="store-tab active" data-filter="all" onclick="filterStore('all',this)">All</button>
      <button class="store-tab" data-filter="subscription" onclick="filterStore('subscription',this)">Subscription</button>
      <button class="store-tab" data-filter="namecolor" onclick="filterStore('namecolor',this)">Name Color</button>
      <button class="store-tab" data-filter="theme" onclick="filterStore('theme',this)">Theme</button>
      <button class="store-tab" data-filter="chateffect" onclick="filterStore('chateffect',this)">Effects</button>
    </div>
    <div id="storeGrid" class="store-grid"></div>
    <button class="modal-close" onclick="closeModal('storeModal')">×</button>
  </div>
</div>

<!-- Admin modal -->
<div id="adminModal" class="modal-bg" onclick="if(event.target===this)closeModal('adminModal')">
  <div class="modal admin-modal">
    <h2>🛡 Admin Dashboard</h2>
    <div class="admin-tabs">
      <button class="admin-tab active" onclick="adminTab('overview',this)">Overview</button>
      <button class="admin-tab" onclick="adminTab('users',this)">Users</button>
      <button class="admin-tab" onclick="adminTab('bans',this)">Bans</button>
      <button class="admin-tab" onclick="adminTab('modlogs',this)">Mod Logs</button>
      <button class="admin-tab" onclick="adminTab('servers',this)">Servers</button>
    </div>
    <div id="adminBody"></div>
    <button class="modal-close" onclick="closeModal('adminModal')">×</button>
  </div>
</div>

<!-- Add Friend -->
<div id="addFriendModal" class="modal-bg" onclick="if(event.target===this)closeModal('addFriendModal')">
  <div class="modal" style="max-width:400px"><h2>Add Friend</h2>
    <div class="field"><label>Search by username</label><input type="text" id="friendSearch" placeholder="username" oninput="searchUsers(this.value,'friendResults')"></div>
    <div id="friendResults"></div>
    <button class="modal-close" onclick="closeModal('addFriendModal')">×</button>
  </div>
</div>

<script src="/js/app.js"></script>
</body>
</html>
