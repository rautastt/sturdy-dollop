<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sigma Chat — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#111214;color:#dcddde;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:16px}
.card{background:#1e1f22;border-radius:16px;padding:32px;width:100%;max-width:420px;box-shadow:0 8px 40px rgba(0,0,0,.5)}
.logo{text-align:center;margin-bottom:24px}
.logo h1{color:#5865f2;font-size:28px;font-weight:700;letter-spacing:-1px}
.logo p{color:#96989d;font-size:14px;margin-top:4px}
h2{font-size:22px;font-weight:700;margin-bottom:6px;text-align:center}
.sub{color:#96989d;font-size:14px;text-align:center;margin-bottom:24px}
label{display:block;font-size:12px;font-weight:600;color:#b5bac1;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
input{width:100%;background:#2b2d31;border:1.5px solid #3f4147;border-radius:8px;color:#dcddde;font-size:15px;padding:11px 14px;outline:none;transition:border-color .15s}
input:focus{border-color:#5865f2}
.field{margin-bottom:16px}
.btn{width:100%;background:#5865f2;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;padding:12px;cursor:pointer;transition:background .15s;margin-top:4px}
.btn:hover{background:#4752c4}
.btn:disabled{opacity:.5;cursor:not-allowed}
.toggle{text-align:center;margin-top:18px;font-size:14px;color:#96989d}
.toggle a{color:#5865f2;text-decoration:none;font-weight:600}
.toggle a:hover{text-decoration:underline}
.error{background:#3d0f0f;border:1px solid #ed4245;border-radius:8px;padding:10px 14px;font-size:13px;color:#ed4245;margin-bottom:16px;display:none}
.success{background:#0f3d1f;border:1px solid #57f287;border-radius:8px;padding:10px 14px;font-size:13px;color:#57f287;margin-bottom:16px;display:none}
.forgot{text-align:right;margin-bottom:16px;margin-top:-8px}
.forgot a{color:#5865f2;font-size:13px;text-decoration:none}
</style>
</head>
<body>
<div class="card">
  <div class="logo"><h1>⚡ Sigma Chat</h1><p>The community for Sigmas</p></div>
  <div id="loginView">
    <h2>Welcome back</h2>
    <p class="sub">Sign in to your account</p>
    <div id="errBox" class="error"></div>
    <div id="okBox" class="success"></div>
    <form id="loginForm">
      <div class="field"><label>Email or Username</label><input type="text" id="login" required autocomplete="username"></div>
      <div class="field"><label>Password</label><input type="password" id="password" required autocomplete="current-password"></div>
      <div class="forgot"><a href="#" id="forgotLink">Forgot password?</a></div>
      <button class="btn" type="submit" id="loginBtn">Sign In</button>
    </form>
    <div class="toggle">Don't have an account? <a href="/register.html">Register</a></div>
  </div>
  <div id="forgotView" style="display:none">
    <h2>Forgot Password</h2>
    <p class="sub">Enter your email and we'll send a reset link</p>
    <div id="forgotErr" class="error"></div>
    <div id="forgotOk" class="success"></div>
    <form id="forgotForm">
      <div class="field"><label>Email</label><input type="email" id="forgotEmail" required></div>
      <button class="btn" type="submit">Send Reset Link</button>
    </form>
    <div class="toggle"><a href="#" id="backToLogin">← Back to login</a></div>
  </div>
</div>
<script>
function show(id,msg){const el=document.getElementById(id);el.textContent=msg;el.style.display='block'}
function hide(id){document.getElementById(id).style.display='none'}
const params=new URLSearchParams(location.search);
if(params.get('verified'))show('okBox','Email verified! You can now log in.');
if(params.get('error'))show('errBox',params.get('error').replace(/_/g,' '));

document.getElementById('loginForm').addEventListener('submit',async e=>{
  e.preventDefault();hide('errBox');hide('okBox');
  const btn=document.getElementById('loginBtn');btn.disabled=true;btn.textContent='Signing in…';
  try{
    const r=await fetch('/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({login:document.getElementById('login').value,password:document.getElementById('password').value}),credentials:'include'});
    const d=await r.json();
    if(!r.ok){show('errBox',d.error||'Login failed');btn.disabled=false;btn.textContent='Sign In';return;}
    location.href='/app.html';
  }catch{show('errBox','Network error');btn.disabled=false;btn.textContent='Sign In';}
});
document.getElementById('forgotLink').addEventListener('click',e=>{e.preventDefault();document.getElementById('loginView').style.display='none';document.getElementById('forgotView').style.display='block'});
document.getElementById('backToLogin').addEventListener('click',e=>{e.preventDefault();document.getElementById('forgotView').style.display='none';document.getElementById('loginView').style.display='block'});
document.getElementById('forgotForm').addEventListener('submit',async e=>{
  e.preventDefault();hide('forgotErr');hide('forgotOk');
  const r=await fetch('/auth/forgot-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:document.getElementById('forgotEmail').value}),credentials:'include'});
  const d=await r.json();
  if(r.ok)show('forgotOk',d.message);else show('forgotErr',d.error||'Failed');
});
</script>
</body>
</html>
