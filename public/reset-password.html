<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sigma Chat — Reset Password</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body class="auth-page">
  <div class="auth-bg">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="logo-icon">Σ</div>
        <span class="logo-text">Sigma Chat</span>
      </div>
      <h1>Set a new password</h1>
      <p class="auth-sub">Enter your new password below.</p>
      <div id="msg-box" class="msg-box hidden"></div>
      <form onsubmit="doReset(event)" id="reset-form">
        <div class="field-group">
          <label>NEW PASSWORD</label>
          <input type="password" id="password" placeholder="At least 8 characters" required minlength="8">
        </div>
        <div class="field-group">
          <label>CONFIRM PASSWORD</label>
          <input type="password" id="password2" placeholder="Repeat new password" required minlength="8">
        </div>
        <button type="submit" class="btn-primary btn-full" id="reset-btn">Reset Password</button>
      </form>
      <p class="auth-footer"><a href="/login.html">← Back to login</a></p>
    </div>
  </div>
  <script>
    const token = new URLSearchParams(location.search).get('token');
    const msgBox = document.getElementById('msg-box');
    function showMsg(msg, type = 'error') {
      msgBox.className = `msg-box msg-${type}`;
      msgBox.textContent = msg;
    }
    if (!token) {
      showMsg('Invalid reset link. Please request a new one.');
      document.getElementById('reset-form').style.display = 'none';
    }
    async function doReset(e) {
      e.preventDefault();
      const p1 = document.getElementById('password').value;
      const p2 = document.getElementById('password2').value;
      if (p1 !== p2) return showMsg('Passwords do not match.');
      const btn = document.getElementById('reset-btn');
      btn.disabled = true; btn.textContent = 'Resetting...';
      try {
        const res = await fetch('/auth/reset-password', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password: p1 }),
        });
        const data = await res.json();
        if (!res.ok) { showMsg(data.error || 'Failed to reset password'); btn.disabled = false; btn.textContent = 'Reset Password'; return; }
        showMsg('Password reset! Redirecting to login...', 'success');
        setTimeout(() => location.href = '/login.html', 2000);
      } catch (err) {
        showMsg('Network error.'); btn.disabled = false; btn.textContent = 'Reset Password';
      }
    }
  </script>
</body>
</html>
