<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sigma Chat — Reset Password</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#111214;color:#dcddde;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:16px}
.card{background:#1e1f22;border-radius:16px;padding:32px;width:100%;max-width:400px;box-shadow:0 8px 40px rgba(0,0,0,.5)}
h1{color:#5865f2;font-size:24px;font-weight:700;margin-bottom:6px}
p{color:#96989d;font-size:14px;margin-bottom:20px}
label{display:block;font-size:12px;font-weight:600;color:#b5bac1;text-transform:uppercase;margin-bottom:6px}
input{width:100%;background:#2b2d31;border:1.5px solid #3f4147;border-radius:8px;color:#dcddde;font-size:15px;padding:11px 14px;outline:none;margin-bottom:16px}
input:focus{border-color:#5865f2}
.btn{width:100%;background:#5865f2;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;padding:12px;cursor:pointer}
.error{background:#3d0f0f;border:1px solid #ed4245;border-radius:8px;padding:10px 14px;font-size:13px;color:#ed4245;margin-bottom:16px;display:none}
.success{background:#0f3d1f;border:1px solid #57f287;border-radius:8px;padding:10px 14px;font-size:13px;color:#57f287;margin-bottom:16px;display:none}
</style>
</head>
<body>
<div class="card">
  <h1>⚡ Reset Password</h1>
  <p>Enter your new password below.</p>
  <div id="errBox" class="error"></div>
  <div id="okBox" class="success"></div>
  <form id="resetForm">
    <label>New Password</label>
    <input type="password" id="password" required minlength="8" placeholder="At least 8 characters">
    <button class="btn" type="submit" id="btn">Reset Password</button>
  </form>
</div>
<script>
const token=new URLSearchParams(location.search).get('token');
if(!token){document.getElementById('errBox').textContent='Invalid or missing token.';document.getElementById('errBox').style.display='block';document.getElementById('resetForm').style.display='none';}
document.getElementById('resetForm').addEventListener('submit',async e=>{
  e.preventDefault();
  document.getElementById('errBox').style.display='none';
  const btn=document.getElementById('btn');btn.disabled=true;btn.textContent='Resetting…';
  const r=await fetch('/auth/reset-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token,password:document.getElementById('password').value})});
  const d=await r.json();
  if(r.ok){document.getElementById('okBox').textContent=d.message+' Redirecting…';document.getElementById('okBox').style.display='block';setTimeout(()=>location.href='/login.html',2000);}
  else{document.getElementById('errBox').textContent=d.error||'Failed';document.getElementById('errBox').style.display='block';btn.disabled=false;btn.textContent='Reset Password';}
});
</script>
</body>
</html>
